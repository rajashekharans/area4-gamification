function clubProgressDetailHtml(state, scores) {
  var clubId = ensureTrendClub(state);
  var club = state.config.clubs.filter(function (c) { return c.id === clubId; })[0];
  var progress = clubProgress(state, clubId, scores);
  var current = scores[clubId];

  var categoryRows = CATEGORY_LABELS.map(function (cat) {
    return '<div class="bd-row">' +
      '<span>' + cat[1] + '</span><span>' + signed(progress.recent.categoryDelta[cat[0]]) + '</span></div>';
  }).join("");

  var historyRows = progress.snapshots.slice().reverse().map(function (snap) {
    var sc = snap.scores[clubId];
    return '<div class="history-row compact">' +
      '<div class="history-info"><div class="history-date">' + esc(snap.date) + '</div>' +
      '<div class="history-clubs">Rank ' + sc.rank + ' · ' +
        CATEGORY_LABELS.map(function (cat) { return cat[1] + ' ' + sc.breakdown[cat[0]]; }).join(' · ') +
      '</div></div><div class="history-total">' + sc.total + '</div></div>';
  }).join("");

  if (!historyRows) {
    historyRows = '<div class="empty-card">No snapshots for this club yet.</div>';
  }

  return '<section class="form-card progress-detail">' +
    '<h3 class="form-section-title">Club progress</h3>' +
    trendClubPickerHtml(state) +
    '<div class="progress-box">' +
      '<div class="progress-title">' + esc(club.name) + '</div>' +
      '<div class="progress-line">Current: ' + current.total + ' points · rank ' + current.rank + '</div>' +
      '<div class="progress-line">Latest: ' + signed(progress.latest.scoreDelta) + ' · ' + rankDeltaText(progress.latest.rankDelta) + '</div>' +
      '<div class="progress-line">Recent: ' + signed(progress.recent.scoreDelta) + ' over ' + progress.recent.count + ' snapshots · ' + rankDeltaText(progress.recent.rankDelta) + '</div>' +
    '</div>' +
    '<div class="breakdown progress-breakdown">' + categoryRows + '</div>' +
    '<h3 class="form-section-title">Snapshot history</h3>' +
    historyRows +
  '</section>';
}

function renderTrends(main, state) {
  // Destroy-before-rebuild: this path is hot (every update() re-render).
  if (trendChart) {
    trendChart.destroy();
    trendChart = null;
  }

  var snaps = state.snapshots;
  var clubs = state.config.clubs;
  var scores = computeScores(state);

  if (snaps.length === 0) {
    main.innerHTML = '<h2 class="screen-title">Trends</h2>' +
      '<div class="empty-card">No snapshots yet — refresh TMI or save one from the Leaderboard</div>';
    return;
  }

  var hasChart = typeof window.Chart === "function";
  var chartCardHtml;
  if (hasChart) {
    chartCardHtml = '<section class="chart-card"><canvas data-trend-canvas></canvas></section>';
  } else {
    // CDN unreachable: the SAME snapshot data as a table that scrolls inside
    // its own wrapper (B5 offline tolerance; no page-level overflow).
    var headRow = '<tr><th scope="col">Date</th>' + clubs.map(function (club) {
      return '<th scope="col">' + esc(shortClubName(club.name)) + '</th>';
    }).join("") + '</tr>';
    var bodyRows = snaps.map(function (snap) {
      return '<tr><td>' + esc(snap.date) + '</td>' + clubs.map(function (club) {
        var sc = snap.scores[club.id];
        return '<td>' + (sc ? sc.total : "—") + '</td>';
      }).join("") + '</tr>';
    }).join("");
    chartCardHtml =
      '<section class="chart-card">' +
        '<div class="trend-table-wrap"><table class="trend-table">' +
          '<thead>' + headRow + '</thead><tbody>' + bodyRows + '</tbody>' +
        '</table></div>' +
        '<p class="chart-note">The line chart needs a network connection once to load — scores above are the same data.</p>' +
      '</section>';
  }

  // Snapshot history, newest first: date + per-club totals + Area total +
  // Sheet-gated delete (ROADMAP criterion 2).
  var historyHtml = snaps.slice().reverse().map(function (snap) {
    var clubTotals = clubs.map(function (club) {
      var sc = snap.scores[club.id];
      return esc(shortClubName(club.name)) + " " + (sc ? sc.total : "—");
    }).join(" · ");
    return '<div class="history-row">' +
      '<div class="history-info">' +
        '<div class="history-date">' + esc(snap.date) + '</div>' +
        '<div class="history-clubs">' + clubTotals + '</div>' +
      '</div>' +
      '<div class="history-total">' + areaTotals(snap.scores) + '</div>' +
      '<button type="button" class="history-delete" data-del-snap="' + esc(snap.date) +
        '" aria-label="Delete snapshot ' + esc(snap.date) + '">Delete</button>' +
    '</div>';
  }).join("");

  main.innerHTML = '<h2 class="screen-title">Trends</h2>' + chartCardHtml +
    clubProgressDetailHtml(state, scores) + historyHtml;

  if (hasChart) {
    // Series colors + legend size read from the live tokens at render time.
    var rootStyles = getComputedStyle(document.documentElement);
    var colors = TREND_PALETTE_TOKENS.map(function (token) {
      return rootStyles.getPropertyValue(token).trim();
    });
    var legendFontSize = parseInt(rootStyles.getPropertyValue("--font-size-xs"), 10);

    trendChart = new Chart(main.querySelector("[data-trend-canvas]"), {
      type: "line",
      data: {
        labels: snaps.map(function (snap) { return snap.date; }),
        datasets: clubs.map(function (club, i) {
          var color = colors[i % colors.length];
          return {
            label: shortClubName(club.name),
            data: snaps.map(function (snap) {
              return snap.scores[club.id] ? snap.scores[club.id].total : null;
            }),
            borderColor: color,
            backgroundColor: color
          };
        })
      },
      options: {
        responsive: true,
        plugins: {
          legend: {
            position: "bottom",
            labels: { font: { size: legendFontSize } }
          }
        }
      }
    });
  }

  main.querySelectorAll("[data-del-snap]").forEach(function (btn) {
    btn.addEventListener("click", function () {
      var date = btn.dataset.delSnap;
      var snap = state.snapshots.filter(function (sn) { return sn.date === date; })[0];
      if (!snap) return;
      openSheet({
        title: "Delete snapshot " + date + "?",
        bodyHtml:
          '<div class="sheet-row"><span>Snapshot date</span>' +
            '<span class="row-total">' + esc(date) + '</span></div>' +
          '<div class="sheet-row"><span>Area total</span>' +
            '<span class="row-total">' + areaTotals(snap.scores) + '</span></div>',
        confirmLabel: "Delete",
        onConfirm: function () {
          // Single mutation path; leaderboard movement now compares against
          // the new latest snapshot automatically.
          update(function (s) {
            s.snapshots = s.snapshots.filter(function (sn) { return sn.date !== date; });
          });
          showToast("Snapshot " + date + " deleted");
        }
      });
    });
  });

  main.querySelectorAll("[data-trend-pick]").forEach(function (chip) {
    chip.addEventListener("click", function () {
      selectedTrendClubId = chip.dataset.trendPick;
      render();
    });
  });
}

// ---- Settings screen (Phase 4) ----

// The 21 weight keys with the workbook's exact row labels, grouped per the
// phase design (single source of truth — mirrors design-spec B2 formulas).
var WEIGHT_GROUPS = [
  ["DCP", [
    ["dcpGoal", "Per DCP goal met"],
    ["distD", "Distinguished (D)"],
    ["distS", "Select Distinguished (S)"],
    ["distP", "President's Distinguished (P)"]
  ]],
  ["Membership", [
    ["memberGrowth", "Per net member gained/lost"],
    ["memberBonus20", "Bonus at 20+ members"]
  ]],
  ["Admin & Deadlines", [
    ["duesOnTime", "Dues on time (per round)"],
    ["officerList", "Officer list on time"],
    ["cotRound", "Per COT round completed"]
  ]],
  ["Awards", [
    ["d90Award", "Per D90 award (Smedley / Talk Up / Beat the Clock)"],
    ["tripleCrown", "Per Triple Crown"],
    ["contestArea", "Per Area contest win"],
    ["contestDivision", "Per Division contest win"],
    ["contestDistrict", "Per District contest win"]
  ]],
  ["Club Health", [
    ["attendance75", "Attendance 75%+"],
    ["attendance50", "Attendance 50–74%"],
    ["perGuest", "Per guest"],
    ["guestCap", "Guest points cap"],
    ["perMeeting", "Per meeting held"],
    ["meetingCap", "Meeting points cap"]
  ]]
];

var PROGRAM_YEARS = ["2025-2026", "2026-2027", "2027-2028"];

// Shared full-state replacement: swaps every top-level key on the EXISTING
// state object (closures keep pointing at it) through one update() call.
function replaceState(nextState) {
  update(function (s) {
    Object.keys(s).forEach(function (k) { delete s[k]; });
    Object.keys(nextState).forEach(function (k) { s[k] = nextState[k]; });
  });
}

function handleImportFile(file) {
  if (!file) return;
  var reader = new FileReader();
  reader.onerror = function () {
    showToast("Could not read that file. Try choosing it again.", "error");
  };
  reader.onload = function () {
    var imported;
    try {
      imported = JSON.parse(String(reader.result));
    } catch (e) {
      // Parse failure: explicit error, state untouched (design Error handling).
      showToast("That file is not valid JSON — export a fresh backup and retry.", "error");
      return;
    }
    var check = validateImport(imported);
    if (!check.ok) {
      // showToast renders via textContent, so error strings stay inert text.
      showToast("Import rejected: " + check.errors.join(" "), "error");
      return;
    }
    var sum = check.summary;
    openSheet({
      title: "Import backup?",
      bodyHtml:
        '<p class="sheet-label">Replaces everything currently in the app.</p>' +
        '<div class="sheet-row"><span>Clubs</span>' +
          '<span class="row-total">' + sum.clubCount + '</span></div>' +
        '<div class="sheet-row"><span>Snapshots</span>' +
          '<span class="row-total">' + sum.snapshotCount + '</span></div>' +
        '<div class="sheet-row"><span>Last TMI sync</span>' +
          '<span class="row-total">' + esc(sum.lastTmiSync === null ? "never" : sum.lastTmiSync) + '</span></div>',
      confirmLabel: "Import",
      onConfirm: function () {
        // loadState path: missing slices fall back to defaults, unknown keys preserved.
        replaceState(deepMerge(structuredClone(DEFAULT_STATE), imported));
        showToast("Backup imported — " + sum.clubCount + " clubs, " +
          sum.snapshotCount + " snapshot" + (sum.snapshotCount === 1 ? "" : "s"));
      }
    });
  };
  reader.readAsText(file);
}

function renderSettings(main, state) {
  // Group 1 — Scoring weights (5 workbook sub-groups, 21 rows).
  var weightsHtml = WEIGHT_GROUPS.map(function (group) {
    return '<h4 class="settings-subcaption">' + esc(group[0]) + '</h4>' +
      group[1].map(function (row) {
        return formRow(row[1],
          '<input class="num-input" inputmode="numeric" data-weight="' + esc(row[0]) +
            '" value="' + state.weights[row[0]] + '" aria-label="' + esc(row[1]) + '">');
      }).join("");
  }).join("");

  // Group 2 — Clubs (name + number; Prospect Phoenix hint chip while null).
  var clubsHtml = state.config.clubs.map(function (club) {
    var hint = club.id === "prospect-phoenix" && club.clubNumber === null
      ? ' <span class="hint-chip">Club number TBC — add it here</span>'
      : "";
    return '<div class="club-config-row">' +
      '<input class="club-name-input" data-club-name="' + esc(club.id) +
        '" value="' + esc(club.name) + '" aria-label="Club name">' +
      '<div class="form-row"><span class="form-label">Club number' + hint + '</span>' +
        '<input class="num-input" inputmode="numeric" data-club-num="' + esc(club.id) +
          '" value="' + (club.clubNumber === null ? "" : club.clubNumber) +
          '" aria-label="Club number for ' + esc(club.name) + '">' +
      '</div>' +
    '</div>';
  }).join("");

  // Group 3 — Program year (drives the TMI fetch URL).
  var yearOptions = PROGRAM_YEARS.map(function (py) {
    return '<option value="' + py + '"' +
      (py === state.config.programYear ? " selected" : "") + '>' + py + '</option>';
  }).join("");

  main.innerHTML =
    '<h2 class="screen-title">Settings</h2>' +
    '<section class="form-card">' +
      '<h3 class="settings-caption">Scoring weights</h3>' + weightsHtml +
    '</section>' +
    '<section class="form-card">' +
      '<h3 class="settings-caption">Clubs</h3>' + clubsHtml +
    '</section>' +
    '<section class="form-card">' +
      '<h3 class="settings-caption">Program year</h3>' +
      formRow("Toastmasters year",
        '<select class="settings-select" data-program-year aria-label="Program year">' +
          yearOptions + '</select>') +
    '</section>' +
    '<section class="form-card">' +
      '<h3 class="settings-caption">Backup</h3>' +
      '<button type="button" class="btn-primary btn-block" data-export>Export JSON</button>' +
      '<div class="file-drop open">' +
        '<ol class="file-drop-steps">' +
          '<li>Importing replaces everything — a preview asks first</li>' +
        '</ol>' +
        '<label class="file-drop-zone" data-import-zone>' +
          '<span>Drop a backup JSON here, or tap to choose a file</span>' +
          '<input type="file" accept=".json" data-import-input>' +
        '</label>' +
      '</div>' +
    '</section>' +
    '<section class="form-card">' +
      '<h3 class="settings-caption">Danger zone</h3>' +
      '<button type="button" class="btn-error-outline btn-block" data-reset>Reset to seed data</button>' +
    '</section>';

  // Weights: parse int, clamp 0-100, revert unparseable input — commit on
  // change (not input) so re-renders never fight the phone keyboard.
  main.querySelectorAll("[data-weight]").forEach(function (input) {
    input.addEventListener("change", function () {
      var key = input.dataset.weight;
      var n = parseInt(input.value, 10);
      if (isNaN(n)) {
        input.value = state.weights[key]; // revert, no state write
        return;
      }
      var v = Math.min(100, Math.max(0, n));
      update(function (s) { s.weights[key] = v; });
    });
  });

  // Club names: trimmed; emptied field reverts to the current name (no write).
  main.querySelectorAll("[data-club-name]").forEach(function (input) {
    input.addEventListener("change", function () {
      var id = input.dataset.clubName;
      var club = state.config.clubs.filter(function (c) { return c.id === id; })[0];
      var name = input.value.trim();
      if (name === "") {
        input.value = club.name; // revert, no state write
        return;
      }
      update(function (s) {
        s.config.clubs.filter(function (c) { return c.id === id; })[0].name = name;
      });
    });
  });

  // Club numbers: non-digits stripped; empty commits null (Prospect Phoenix
  // decision in the design spec).
  main.querySelectorAll("[data-club-num]").forEach(function (input) {
    input.addEventListener("change", function () {
      var id = input.dataset.clubNum;
      var digits = input.value.replace(/\D/g, "");
      var num = digits === "" ? null : parseInt(digits, 10);
      update(function (s) {
        s.config.clubs.filter(function (c) { return c.id === id; })[0].clubNumber = num;
      });
    });
  });

  main.querySelector("[data-program-year]").addEventListener("change", function (e) {
    var py = e.target.value;
    if (PROGRAM_YEARS.indexOf(py) === -1) return;
    update(function (s) { s.config.programYear = py; });
  });

  // Export: full live state as a dated Blob download (B4 boundary).
  main.querySelector("[data-export]").addEventListener("click", function () {
    var blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    a.download = "idiff-area4-backup-" + localToday() + ".json";
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
    showToast("Backup exported");
  });

  // Import FileDrop (Phase 3 wiring pattern: input + dragover/drop).
  var zone = main.querySelector("[data-import-zone]");
  var importInput = zone.querySelector("[data-import-input]");
  importInput.addEventListener("change", function () {
    handleImportFile(importInput.files && importInput.files[0]);
  });
  zone.addEventListener("dragover", function (e) {
    e.preventDefault();
    zone.classList.add("drag");
  });
  zone.addEventListener("dragleave", function () {
    zone.classList.remove("drag");
  });
  zone.addEventListener("drop", function (e) {
    e.preventDefault();
    zone.classList.remove("drag");
    handleImportFile(e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0]);
  });

  // Danger zone: Sheet-gated reset to a DEFAULT_STATE deep copy (B5 data safety).
  main.querySelector("[data-reset]").addEventListener("click", function () {
    openSheet({
      title: "Reset to seed data?",
      bodyHtml:
        '<p class="sheet-label">All scores, snapshots, weights and club changes ' +
          'will be replaced with the original seed data. Export a backup first ' +
          'if you might want this data back.</p>',
      confirmLabel: "Reset",
      onConfirm: function () {
        replaceState(structuredClone(DEFAULT_STATE));
        showToast("Reset to seed data");
      }
    });
  });
}

var SCREENS = {
  leaderboard: renderLeaderboard,
  tmi: renderTmi,
  manual: renderManual,
  trends: renderTrends,
  settings: renderSettings
};

function currentRoute() {
  var route = (location.hash || "#leaderboard").slice(1);
  return Object.prototype.hasOwnProperty.call(SCREENS, route) ? route : "leaderboard";
}

function render() {
  var route = currentRoute();
  SCREENS[route](document.getElementById("screen"), state);
  document.querySelectorAll(".tab-bar button").forEach(function (btn) {
    btn.classList.toggle("active", btn.dataset.route === route);
  });
}

document.querySelectorAll(".tab-bar button").forEach(function (btn) {
  btn.addEventListener("click", function () {
    location.hash = "#" + btn.dataset.route;
  });
});

window.addEventListener("hashchange", render);
render();

}());
</script>
